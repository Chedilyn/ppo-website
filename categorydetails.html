<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PPO | Category Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
  --primary-green:#1b5e20;
  --accent-green:#2e7d32;
  --sidebar-gradient:linear-gradient(180deg,#3fa363 0%,#1b5e20 100%);
  --bg-light:#f1f5f9;
  --white:#fff;
  --shadow:0 10px 30px rgba(0,0,0,.1);
  --danger-red: #d32f2f;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif;}
body{ background:var(--bg-light); height:100vh; display:flex; flex-direction:column; overflow: hidden; }

/* HEADER */
.header{ height:70px; background:#fff; display:flex; justify-content:space-between; align-items:center; padding:0 40px; box-shadow:0 1px 3px rgba(0,0,0,.08); z-index: 10; }
.header-left{ display:flex; align-items:center; gap:18px; flex: 1; } /* Added flex:1 */
.header-left img{ height:45px; }

/* CENTER TITLE STYLES */
.header-center { flex: 2; text-align: center; margin-right: -150px; }
.header-title { font-size: 18px; font-weight: 800; color: var(--primary-green); text-transform: uppercase; margin: 0; letter-spacing: 0.5px; }

.header-right{ display:flex; align-items:center; gap:18px; flex: 1; justify-content: flex-end; } /* Added flex:1 and alignment */
.back-link{ font-size:14px; font-weight:600; color:#1b5e20; text-decoration:none; margin-right: 20px;}

.user-icon{
  width:38px; height:38px; border-radius:50%;
  background:#e6f4ea; display:flex; align-items:center;
  justify-content:center; color:#1b5e20; font-size:16px; cursor:pointer;
}

/* NAVIGATION BUTTONS */
.btn-folder-back {
    display: none; 
    background: #e6f4ea; color: var(--primary-green); border: none; padding: 12px 20px;
    border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer;
    align-items: center; gap: 10px; margin-bottom: 20px; transition: 0.2s;
    border: 1px solid rgba(27, 94, 32, 0.1);
}
.btn-folder-back:hover { background: var(--primary-green); color: white; transform: translateX(-5px); }

.btn-create-subfolder {
    background: var(--white); color: var(--primary-green); border: 2px dashed var(--primary-green);
    padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; transition: 0.3s;
}
.btn-create-subfolder:hover { background: var(--primary-green); color: white; border-style: solid; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(27, 94, 32, 0.2); }

/* LAYOUT */
.dashboard-container{ display:flex; flex:1; height:calc(100vh - 70px); }
.sidebar{ width:280px; background:var(--sidebar-gradient); padding:40px 0; color:white; flex-shrink: 0;}
.sidebar-brand{ margin:0 20px 40px; padding:20px; border-radius:16px; font-weight:800; text-align:center; font-size:20px; background:rgba(255,255,255,.15); }
.sidebar-label { padding: 0 30px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 10px; }
.menu-item{ padding:16px 30px; font-size:13px; color:rgba(255,255,255,.9); margin:4px 20px; border-radius:12px; cursor:pointer; display:flex; align-items:center; text-decoration: none; transition: 0.2s; position: relative; }
.menu-item.active{ background:#fff; color:var(--primary-green); font-weight:700; }
.main-content{ flex:1; padding:40px; background:#f8fafc; overflow-y:auto; }
.green-bar{ font-size:24px; font-weight:800; color:var(--primary-green); margin-bottom:10px; text-transform: uppercase; }

/* SEARCH BAR */
.action-bar{ background:#fff; padding:10px 15px; border-radius:16px; display:flex; gap:15px; box-shadow:var(--shadow); margin-top: 20px;}
.search-input{ flex:1; padding:10px; border:none; outline:none; }

/* FILE CARD */
.file-card{ 
    background:white; 
    padding:18px; 
    border-radius:12px; 
    margin-top:15px; 
    box-shadow:0 2px 8px rgba(0,0,0,0.05); 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    transition: 0.2s;
}
.file-card:hover { transform: translateX(5px); border-left: 4px solid var(--primary-green); }
.file-info { display: flex; flex-direction: column; gap: 4px; flex: 1; cursor: pointer; }
.file-title{ font-weight:600; color:#1b5e20; word-break: break-all; }
.file-date { font-size: 11px; color: #64748b; font-weight: 400; display: flex; align-items: center; gap: 6px; }


/* ACTION MENU */
.action-menu {
    position: relative;
}

.menu-trigger {
    font-size: 18px;
    cursor: pointer;
    padding: 8px;
    border-radius: 6px;
    transition: 0.2s;
}
.menu-trigger:hover {
    background: rgba(0,0,0,0.05);
}

.menu-dropdown {
    position: absolute;
    right: 0;
    top: 35px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    overflow: hidden;
    display: none;
    min-width: 140px;
    z-index: 100;
}

.menu-dropdown.show {
    display: block;
}

.menu-item-action {
    padding: 12px 14px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.2s;
}

.menu-item-action:hover {
    background: #f1f5f9;
}

.menu-item-action.delete {
    color: #d32f2f;
}
/* DELETE ICONS */
.delete-btn {
    padding: 10px;
    color: #94a3b8;
    transition: 0.2s;
    cursor: pointer;
}
.delete-btn:hover { color: var(--danger-red); transform: scale(1.2); }

.sub-delete {
    position: absolute;
    right: 15px;
    opacity: 0;
    transition: 0.2s;
    font-size: 12px;
}
.menu-item:hover .sub-delete { opacity: 0.7; }
.sub-delete:hover { opacity: 1 !important; color: #ffab91; }

/* MODAL & TOAST */
.modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); align-items: center; justify-content: center;}
.modal-content { background: white; margin: auto; padding: 35px; border-radius: 24px; width: 420px; box-shadow: var(--shadow); transform: scale(0.9); transition: 0.3s ease-out; position: relative; }
.modal.active { display: flex; }
.modal.active .modal-content { transform: scale(1); }
.modal-content h3 { color: var(--primary-green); font-size: 22px; margin-bottom: 8px; }
.modal-content p { color: #64748b; font-size: 14px; margin-bottom: 20px; }
.modal-content input { width: 100%; padding: 14px; margin-bottom: 25px; border: 2px solid #eaecf0; border-radius: 12px; outline: none; font-size: 15px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 12px; }
.btn-confirm { background: var(--primary-green); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 600; }
.btn-confirm.danger { background: var(--danger-red); }
.btn-cancel { background: #f2f4f7; color: #344054; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; }

#toast { position: fixed; top: 30px; right: 30px; padding: 16px 24px; background: #1b5e20; color: white; border-radius: 12px; z-index: 2000; transform: translateX(150%); transition: 0.5s; }
#toast.show { transform: translateX(0); }
#toast.error { background: var(--danger-red); }
#loader { text-align: center; padding: 50px; color: var(--primary-green); }
</style>
</head>

<body>

<div id="toast"><i class="fa-solid fa-circle-check"></i> <span id="toastMsg">Action Successful!</span></div>

<header class="header">
  <div class="header-left">
    <img src="logo2.png"> <img src="logo3.png"> <img src="logo4.png">
  </div>
  <div class="header-center">
    <h1 class="header-title">Provincial Population Office</h1>
  </div>
  <div class="header-right">
    <a href="dashboardmenu.html" class="back-link">BACK TO HUB</a>
    <div class="user-icon" onclick="window.location.href='profile.html'"><i class="fa-solid fa-user"></i></div>
  </div>
</header>

<div class="dashboard-container">
<aside class="sidebar">
  <div class="sidebar-brand">PPO SYSTEM</div>
  <div class="sidebar-label">Primary Category</div>
  <a class="menu-item active" href="#" id="sidebarCurrentFolder"><i class="fa-solid fa-folder-open" style="margin-right:10px"></i> LOADING...</a>
  
  <div id="sidebarSubcategoryWrapper">
    <div style="margin-top: 25px;" class="sidebar-label">Sub-Category</div>
    <div id="subfolderList"></div>
  </div>
</aside>

<main class="main-content">
  <button class="btn-folder-back" id="backBtn" onclick="goBackToParent()">
      <i class="fa-solid fa-arrow-left-long"></i> RETURN TO PREVIOUS FOLDER
  </button>

  <h1 class="green-bar" id="folderTitle">Loading...</h1>

  <div id="createSubfolderArea" style="margin-top: 20px; display: flex; gap: 15px;">
      <button class="btn-create-subfolder" onclick="openCreateModal()" style="flex: 1;">
          <i class="fa-solid fa-folder-plus"></i> NEW SUBFOLDER INSIDE THIS CATEGORY
      </button>

      <button class="btn-create-subfolder" onclick="document.getElementById('directFileInput').click()" style="flex: 1; border-color: #2563eb; color: #2563eb;">
          <i class="fa-solid fa-cloud-arrow-up"></i> UPLOAD FILE TO THIS DIRECTORY
      </button>

      <button class="btn-create-subfolder" 
      onclick="openDeleteAllModal()" 
        style="flex: 1; border-color:#d32f2f; color:#d32f2f;">
        <i class="fa-solid fa-trash"></i> DELETE ALL FILES
    </button>
    
      <input type="file" id="directFileInput" style="display:none" onchange="handleDirectUpload(this)">
  </div>

  <div class="action-bar">
    <input type="text" id="searchInput" class="search-input" placeholder="Search files in this directory...">
    <div style="padding: 10px; color: var(--primary-green); font-weight: 700; cursor: pointer;" onclick="refreshFiles()">
        <i class="fa-solid fa-arrows-rotate"></i>
    </div>
  </div>

  <div id="fileContainer">
      <div id="loader"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading contents...</div>
  </div>
</main>
</div>

<div id="folderModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Create Subfolder</h3>
        <p id="modalDesc">Location: <b id="parentNameLabel" style="color:var(--primary-green)"></b></p>
        <input type="text" id="folderNameInput" placeholder="Enter name">
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-confirm" id="confirmBtn">
                <span id="btnText">Confirm</span>
            </button>
        </div>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzukBdhRzbWPWLMH1hrmL7iZIL6x37aI2h6jEDAiaLp0sat212xHbmj1THFni6VpeHJ/exec";

const ROOT_ID = "1POMGnIc_QRJbEeOiWbPwiV2YidsBa9YA";
const params = new URLSearchParams(window.location.search);
const folderName = params.get('folder');
const urlFolderId = params.get('folderId');
const isSub = params.get('isSub'); 

const currentFolderId = urlFolderId || ROOT_ID;

document.addEventListener("DOMContentLoaded", () => {
    const backBtn = document.getElementById('backBtn');
    const createArea = document.getElementById('createSubfolderArea');
    const sidebarSubSection = document.getElementById('sidebarSubcategoryWrapper');
    
    if (isSub === "true") {
        if(backBtn) backBtn.style.display = 'flex';
        if(createArea) {
            // hide only the "create new folder" button, not the upload button
            createArea.querySelector('.btn-create-subfolder:first-child').style.display = 'none';
        }
        if(sidebarSubSection) sidebarSubSection.style.display = 'none'; 
    }

    if (folderName && urlFolderId) {
        const decoded = decodeURIComponent(folderName);
        document.getElementById('folderTitle').textContent = decoded;
        document.getElementById('sidebarCurrentFolder').innerHTML = `<i class="fa-solid fa-folder-open" style="margin-right:10px"></i> ${decoded}`;
        document.getElementById('parentNameLabel').textContent = decoded;
        
        loadFiles(urlFolderId);
        
        if (isSub !== "true") {
            loadSubfolders(urlFolderId);
        }
    } else {
        document.getElementById('folderTitle').textContent = "Main Dashboard";
        loadFiles(ROOT_ID);
    }
});

async function handleDirectUpload(input) {
    const file = input.files[0];
    if (!file) return;

    showToast("Reading file...");
    const reader = new FileReader();
    reader.onload = async function(e) {
        const base64Data = e.target.result.split(',')[1];
        const payload = {
            action: "uploadFile",
            fileName: file.name,
            mimeType: file.type,
            fileData: base64Data,
            folderId: currentFolderId,
            bypassPending: true // NEW FLAG: Tells the script to ignore the Pending folder
        };

        try {
            showToast("Uploading directly...");
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (result.success) {
                showToast("File uploaded successfully!");
                input.value = ""; 
                setTimeout(() => refreshFiles(), 1500);
            } else {
                showToast("Upload failed: " + result.error, true);
            }
        } catch (error) {
            showToast("Server connection error", true);
        }
    };
    reader.readAsDataURL(file);
}

function refreshFiles() {
    loadFiles(currentFolderId);
    showToast("Refreshing...");
}

function goBackToParent() { window.history.back(); }

function showToast(msg, isError = false) { 
    const t = document.getElementById('toast'); 
    document.getElementById('toastMsg').textContent = msg; 
    t.className = isError ? 'show error' : 'show';
    setTimeout(() => t.classList.remove('show'), 3000); 
}

function closeModal() { 
    const m = document.getElementById('folderModal'); 
    m.classList.remove('active'); 
    setTimeout(() => { m.style.display = 'none'; }, 300); 
}

function openCreateModal() {
    const m = document.getElementById('folderModal');
    document.getElementById('modalTitle').textContent = "Create Subfolder";
    document.getElementById('modalDesc').style.display = "block";
    document.getElementById('folderNameInput').style.display = "block";
    document.getElementById('folderNameInput').value = "";
    document.getElementById('btnText').textContent = "Create Folder";
    const confirmBtn = document.getElementById('confirmBtn');
    confirmBtn.className = "btn-confirm";
    confirmBtn.onclick = confirmCreateFolder;
    
    m.style.display = 'flex'; 
    setTimeout(() => m.classList.add('active'), 10);
}

function openDeleteModal(id, type, name) {
    const m = document.getElementById('folderModal');
    document.getElementById('modalTitle').textContent = "Confirm Deletion";
    document.getElementById('modalDesc').innerHTML = `Are you sure you want to delete <b>${name}</b>? This action cannot be undone.`;
    document.getElementById('folderNameInput').style.display = "none";
    document.getElementById('btnText').textContent = "Delete Permanently";
    const confirmBtn = document.getElementById('confirmBtn');
    confirmBtn.className = "btn-confirm danger";
    confirmBtn.onclick = () => confirmDeleteItem(id, type);
    
    m.style.display = 'flex'; 
    setTimeout(() => m.classList.add('active'), 10);
}

function openDeleteAllModal() {
    const m = document.getElementById('folderModal');
    document.getElementById('modalTitle').textContent = "Delete All Files";
    document.getElementById('modalDesc').innerHTML = 
        `Are you sure you want to delete <b>ALL FILES</b> in this folder? This cannot be undone.`;

    document.getElementById('folderNameInput').style.display = "none";
    document.getElementById('btnText').textContent = "Delete All";

    const confirmBtn = document.getElementById('confirmBtn');
    confirmBtn.className = "btn-confirm danger";
    confirmBtn.onclick = confirmDeleteAll;

    m.style.display = 'flex'; 
    setTimeout(() => m.classList.add('active'), 10);
}

async function confirmCreateFolder() {
    const input = document.getElementById('folderNameInput');
    const btn = document.getElementById('confirmBtn');
    const newName = input.value.trim();
    if(!newName) return;
    
    btn.disabled = true;
    document.getElementById('btnText').textContent = "Creating...";

    try {
        const res = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ 
                action: "createSubfolder", 
                folderName: newName, 
                parentId: currentFolderId 
            })
        });
        const result = await res.json();
        if(result.success) {
            showToast("Folder created!");
            closeModal();
            setTimeout(() => location.reload(), 1000);
        } else {
            showToast("Error: " + result.error, true);
            btn.disabled = false;
        }
    } catch (e) { 
        showToast("Server connection failed", true); 
        btn.disabled = false; 
    }
}

async function confirmDeleteItem(id, type) {
    const btn = document.getElementById('confirmBtn');
    btn.disabled = true;
    document.getElementById('btnText').textContent = "Deleting...";

    try {
        const res = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "deleteItem", itemId: id })
        });
        const result = await res.json();
        if (result.success) {
            showToast(`${type} deleted!`);
            closeModal();
            setTimeout(() => location.reload(), 1000);
        } else {
            showToast("Delete failed: " + result.error, true);
            btn.disabled = false;
        }
    } catch (e) {
        showToast("Server error during deletion", true);
        btn.disabled = false;
    }
}

async function confirmDeleteAll() {
    const btn = document.getElementById('confirmBtn');
    btn.disabled = true;
    document.getElementById('btnText').textContent = "Deleting...";

    try {
        const res = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "deleteAllFiles",
                folderId: currentFolderId
            })
        });

        const result = await res.json();

        if (result.success) {
            showToast("All files deleted!");
            closeModal();
            setTimeout(() => refreshFiles(), 1000);
        } else {
            showToast("Error: " + result.error, true);
            btn.disabled = false;
        }
    } catch (e) {
        showToast("Server error", true);
        btn.disabled = false;
    }
}

function toggleMenu(event) {
    event.stopPropagation();

    // Close all menus first
    document.querySelectorAll('.menu-dropdown').forEach(m => m.classList.remove('show'));

    const menu = event.target.closest('.action-menu').querySelector('.menu-dropdown');
    menu.classList.toggle('show');
}

// Close menu when clicking outside
document.addEventListener('click', () => {
    document.querySelectorAll('.menu-dropdown').forEach(m => m.classList.remove('show'));
});

async function loadSubfolders(parentId) {
    const list = document.getElementById("subfolderList");
    list.innerHTML = '<div style="padding:10px 30px; font-size:12px; opacity:0.6;"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading...</div>';
    try {
        const res = await fetch(SCRIPT_URL, { 
            method: "POST", 
            body: JSON.stringify({ action: "getSubfolders" }) 
        });
        const data = await res.json();
        if (data.success) {
            const children = data.folders.filter(f => 
                f.parentId === parentId && 
                f.status !== "HIDDEN" && 
                f.name !== "Pending Review"
            );
            
            if (children.length === 0) {
                list.innerHTML = '<p style="padding:0 30px; font-size:12px; opacity:0.5;">No nested items</p>';
                return;
            }
            let folderHtml = "";
            children.forEach(sub => {
                folderHtml += `
                    <div style="position:relative">
                        <a class="menu-item" href="categoryDetails.html?folder=${encodeURIComponent(sub.name)}&folderId=${sub.id}&isSub=true">
                            <i class="fa-solid fa-folder" style="margin-right:10px; font-size:11px;"></i> ${sub.name}
                            <i class="fa-solid fa-trash-can sub-delete" onclick="event.preventDefault(); openDeleteModal('${sub.id}', 'folder', '${sub.name.replace(/'/g, "\\'")}')"></i>
                        </a>
                    </div>`;
            });
            list.innerHTML = folderHtml;
        }
    } catch (e) { 
        list.innerHTML = '<p style="padding:0 30px; font-size:12px; color:red;">Error loading folders</p>'; 
    }
}

async function loadFiles(targetId) {
    const container = document.getElementById("fileContainer");
    container.innerHTML = '<div id="loader"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading contents...</div>';
    
    try {
        const res = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ 
                action: "getRecentFiles", 
                specificFolderId: targetId 
            })
        });
        const result = await res.json();
        
        if (result.success && result.files && result.files.length > 0) {
            container.innerHTML = "";
            result.files.forEach(file => {
                const div = document.createElement("div");
                div.className = "file-card";
                
                const uploadDate = file.date || "Recent";
                const fileId = file.id || "";
                const isExcel = file.name.toLowerCase().includes('xls');
                const fileIcon = isExcel ? 'fa-file-excel' : 'fa-file-pdf';
                const iconColor = isExcel ? '#16a34a' : '#e11d48';

                div.innerHTML = `
                    <div class="file-info" onclick="window.open('${file.url}', '_blank')">
                        <div class="file-title">${file.name}</div>
                        <div class="file-date">
                            <i class="fa-regular fa-clock"></i> Uploaded: ${uploadDate}
                        </div>
                    </div>
                    <div class="action-menu">
                        <i class="fa-solid fa-ellipsis-vertical menu-trigger" onclick="toggleMenu(event)"></i>

                        <div class="menu-dropdown">
                            <div class="menu-item-action" onclick="window.open('${file.url}', '_blank')">
                                <i class="fa-solid fa-eye"></i> View
                            </div>
                            <div class="menu-item-action delete" onclick="openDeleteModal('${fileId}', 'file', '${file.name.replace(/'/g, "\\'")}')">
                                <i class="fa-solid fa-trash"></i> Delete
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        } else { 
            container.innerHTML = '<div style="text-align:center; padding:50px; opacity:0.5;">No documents found in this directory. If you just uploaded, wait 5 seconds and click the refresh icon.</div>'; 
        }
    } catch (e) { 
        container.innerHTML = '<div style="text-align:center; padding:50px; color:#e11d48;">Connection failed. Check your Apps Script URL.</div>'; 
    }
}

document.getElementById('searchInput').addEventListener('input', function(e) {
    const term = e.target.value.toLowerCase();
    document.querySelectorAll('.file-card').forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(term) ? 'flex' : 'none';
    });
});
</script>
</body>
</html>
