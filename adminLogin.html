<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator Login | Provincial Population Office</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary-green: #1a4d2e;
            --accent-green: #2ecc71;
            --admin-gold: #f1c40f;
            --text-dark: #2c2c2c;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --danger-red: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f0f2f5; min-height: 100vh; display: flex; flex-direction: column; }

        /* ===== OFFICIAL HEADER ===== */
        header {
            background: #ffffff;
            padding: 15px 5%;
            border-bottom: 3px solid var(--accent-green);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-left img {
            height: 75px;
            width: auto;
            object-fit: contain;
            transition: var(--transition);
        }

        .header-center {
            text-align: center;
            flex: 1;
            padding: 0 20px;
            margin-left: -180px;
        }

        header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: var(--primary-green);
            letter-spacing: -0.5px;
            line-height: 1.2;
            text-transform: uppercase;
        }

        /* ===== HOME BUTTON STYLE ===== */
        .nav-pill { 
            display: flex; 
            gap: 10px; 
            background: #f0f2f5; 
            padding: 6px; 
            border-radius: 40px; 
            border: 1px solid #e2e8f0; 
        }

        .home-btn { 
            padding: 10px 24px; 
            border-radius: 30px; 
            text-decoration: none; 
            color: var(--primary-green); 
            font-weight: 700; 
            font-size: 13px; 
            text-transform: uppercase;
            transition: var(--transition); 
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .home-btn:hover { 
            background: var(--primary-green); 
            color: white; 
            transform: translateY(-2px);
        }

        /* ===== ADMIN STYLES ===== */
        .admin-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; background: linear-gradient(rgba(15, 61, 38, 0.9), rgba(26, 77, 46, 0.95)), url('mainback.png') no-repeat center / cover; background-attachment: fixed; }
        .admin-card { width: 100%; max-width: 600px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px; padding: 60px 40px; text-align: center; color: #ffffff; box-shadow: 0 25px 60px rgba(0,0,0,0.4); animation: fadeIn 0.8s ease-out; }
        .admin-icon { font-size: 50px; color: var(--admin-gold); margin-bottom: 20px; }
        .admin-card h2 { font-family: 'Montserrat', sans-serif; font-size: 32px; font-weight: 800; margin-bottom: 10px; letter-spacing: 1px; }
        .admin-card p { font-size: 15px; opacity: 0.8; margin-bottom: 40px; font-weight: 300; }

        .google-box { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .google-btn { display: inline-flex; align-items: center; justify-content: center; gap: 15px; background: #ffffff; color: #333; width: 100%; max-width: 320px; padding: 16px 20px; border-radius: 12px; font-size: 15px; font-weight: 700; text-decoration: none; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: var(--transition); cursor: pointer; border: none; }
        .google-btn img { height: 24px; }
        .google-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); background: #f8f8f8; }
        .google-btn:disabled { cursor: not-allowed; opacity: 0.7; }

        .restricted { margin-top: 25px; font-size: 12px; color: var(--admin-gold); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* ===== CUSTOM POPUP STYLES ===== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        .modal-content {
            background: white; padding: 40px; border-radius: 20px;
            max-width: 400px; width: 90%; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: modalPop 0.3s ease-out;
        }
        @keyframes modalPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-content i { font-size: 60px; color: var(--danger-red); margin-bottom: 20px; }
        .modal-content h3 { color: var(--primary-green); font-family: 'Montserrat', sans-serif; margin-bottom: 10px; font-size: 22px; }
        .modal-content p { color: #666; font-size: 15px; margin-bottom: 25px; line-height: 1.5; }
        .modal-btn { 
            background: var(--primary-green); color: white; border: none; 
            padding: 12px 30px; border-radius: 10px; font-weight: 700; 
            cursor: pointer; width: 100%; transition: var(--transition);
        }
        .modal-btn:hover { background: var(--accent-green); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 992px) { 
            header { flex-direction: column; gap: 20px; padding: 20px; }
            .header-center { margin-left: 0; }
            .admin-card { padding: 40px 20px; } 
        }
    </style>
</head>
<body>

<div class="modal-overlay" id="errorModal">
    <div class="modal-content">
        <i class="fa-solid fa-circle-exclamation"></i>
        <h3 id="modalTitle">Access Denied</h3>
        <p id="modalMessage">You are not registered as an administrator in our system.</p>
        <button class="modal-btn" onclick="closeModal()">Close</button>
    </div>
</div>

<header>
    <div class="header-left">
        <img src="logo4.png" alt="Bagong Pilipinas">
        <img src="logo2.png" alt="Province of Misamis Oriental">
        <img src="logo3.png" alt="PPO">
    </div>

    <div class="header-center">
        <h1>Provincial Population Office</h1>
    </div>

    <div class="nav-pill">
        <a href="index.html" class="home-btn">
            <i class="fa-solid fa-house"></i> Home
        </a>
    </div>
</header>

<section class="admin-wrapper">
    <div class="admin-card">
        <div class="admin-icon">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h2>ADMINISTRATOR LOGIN</h2>
        <p>This portal is for authorized management personnel. Please verify your identity using Google SSO.</p>

        <div class="google-box">
            <button class="google-btn" id="googleSignIn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Authenticate with Google
            </button>

            <div class="restricted">
                <i class="fa-solid fa-circle-exclamation"></i>
                Authorized Access Only
            </div>
        </div>
    </div>
</section>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6MAPqz4zt6Ed9vdLH6x01Imfqc6PjlI8",
        authDomain: "ppo-system.firebaseapp.com",
        projectId: "ppo-system",
        storageBucket: "ppo-system.appspot.com",
        messagingSenderId: "928903097456",
        appId: "1:928903097456:web:6862effa063911af7bd8b5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ✅ HERE: Define the provider with forced account selection
    const provider = new GoogleAuthProvider();
    provider.addScope("https://www.googleapis.com/auth/drive.file");
    provider.setCustomParameters({
        prompt: 'select_account'  // Always show account chooser
    });

    // Function to show custom modal
    window.showModal = (title, message) => {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMessage').innerText = message;
        document.getElementById('errorModal').style.display = 'flex';
    };

    window.closeModal = () => {
        document.getElementById('errorModal').style.display = 'none';
        location.reload();
    };

    document.getElementById("googleSignIn").onclick = async () => {
        const btn = document.getElementById("googleSignIn");
        btn.disabled = true;
        btn.textContent = "Checking Database...";
        
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;

            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                const data = userSnap.data();
                
                if (data.role === "admin") {
                    const credential = GoogleAuthProvider.credentialFromResult(result);
                    const accessToken = credential?.accessToken || result._tokenResponse?.oauthAccessToken;

                    const cleanName = user.displayName ? user.displayName.toUpperCase() : "ADMIN";
                    sessionStorage.setItem("ppoUserName", cleanName);

                    sessionStorage.setItem("driveToken", accessToken);
                    sessionStorage.setItem("userRole", "admin");

                    window.location.replace("Profile.html");

                } else {
                    await signOut(auth);
                    showModal("ROLE ERROR", "You are not registered as an administrator. Access denied.");
                }
            } else {
                await signOut(auth);
                showModal("NOT REGISTERED", "Authorized UID not found. You are not registered as an admin in our database.");
            }

        } catch (err) {
            console.error(err);
            showModal("CONNECTION ERROR", "Could not connect to the database. Please try again.");
            btn.disabled = false;
            btn.textContent = "Authenticate with Google";
        }
    };
</script>
</body>
</html>
