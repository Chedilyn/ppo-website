<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Provincial Population Office</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --primary-green: #1a4d2e;
      --accent-green: #2ecc71;
      --text-dark: #2c2c2c;
      --white: #ffffff;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --danger-red: #ef4444;
    }

    * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { margin:0; background:#f0f2f5; min-height:100vh; display:flex; flex-direction:column; }

    /* ===== HEADER (UPDATED) ===== */
    .header {
        background: #ffffff;
        padding: 15px 5%;
        border-bottom: 1px solid #e2e8f0;
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .header-left img {
        height: 75px;
        width: auto;
        object-fit: contain;
        transition: transform 0.3s ease;
    }

    .header-left img:hover { transform: scale(1.05); }

    .header-center {
            text-align: center;
            flex: 1;
            padding: 0 20px;
            margin-left: -100px;
        }


    .republic-text {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #757575; /* Grey text */
            display: block;
            margin-bottom: -2px;
        }

    .province-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #004d40; /* The dark green color from your image */
            display: block;
            margin-bottom: 2px;
        }

    .ppo-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 35px; /* Large main title */
            font-weight: 900;
            color: #1a1a1a; /* Solid black */
            letter-spacing: -1px;
            line-height: 1;
            margin: 0;
        }

    nav {
        display: flex;
        align-items: center;
        gap: 25px;
    }

    nav a {
        text-decoration: none;
        font-size: 13px;
        font-weight: 700;
        color: #444;
        text-transform: uppercase;
        letter-spacing: 1px;
        position: relative;
        padding: 10px 0;
        transition: var(--transition);
    }

    nav a:hover { color: var(--primary-green); }

    /* SIGN UP ACTIVE STATE */
    .nav-signup { color: var(--primary-green); }
    .nav-signup::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 100%;
        height: 4px;
        background: var(--accent-green);
        border-radius: 2px;
    }

    /* ===== MAIN ===== */
    .main-wrapper { flex:1; display:flex; align-items:center; justify-content:center; padding:50px 20px; background:linear-gradient(rgba(26,77,46,0.8), rgba(26,77,46,0.9)), url('mainback.png') no-repeat center/cover; background-attachment:fixed; }
    .signup-card { width:100%; max-width:800px; background:rgba(255,255,255,0.1); backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,0.2); border-radius:24px; padding:60px 50px; color:#fff; box-shadow:0 25px 50px rgba(0,0,0,0.3); animation:fadeIn 0.6s ease-out; }
    .signup-card h2 { font-family:'Montserrat', sans-serif; font-size:42px; font-weight:800; margin-bottom:10px; text-align:center; letter-spacing:-1px; }
    .signup-card p { text-align:center; margin-bottom:40px; font-size:16px; opacity:0.9; font-weight:300; }

    /* ===== FORM ===== */
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
    .input-wrapper { position:relative; background:rgba(255,255,255,0.15); border:1.5px solid rgba(255,255,255,0.2); border-radius:12px; transition:var(--transition); }
    .input-wrapper:focus-within { background:#fff; border-color:var(--accent-green); box-shadow:0 0 0 4px rgba(46,204,113,0.2); }
    .form input { width:100%; padding:16px 20px; background:transparent; border:none; color:#fff; font-size:15px; outline:none; }
    .input-wrapper:focus-within input { color:var(--text-dark); }
    .form input::placeholder { color:rgba(255,255,255,0.7); }
    .input-wrapper:focus-within input::placeholder { color:#999; }

    .password-wrapper { position:relative; }
    .toggle-password { position:absolute; right:18px; top:50%; transform:translateY(-50%); cursor:pointer; color:rgba(255,255,255,0.6); transition:var(--transition); z-index:10; }
    .input-wrapper:focus-within .toggle-password { color:var(--primary-green); }

    .submit-btn { width:100%; padding:18px; border-radius:12px; border:none; font-size:16px; font-weight:700; cursor:pointer; background:var(--accent-green); color:#fff; transition:var(--transition); text-transform:uppercase; letter-spacing:1px; margin-top:20px; }
    .submit-btn:hover { background:#fff; color:var(--primary-green); transform:translateY(-2px); box-shadow:0 10px 20px rgba(0,0,0,0.2); }

    /* ===== CUSTOM MODAL STYLES ===== */
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
        display: none; justify-content: center; align-items: center; z-index: 2000;
    }
    .modal-content {
        background: #fff; color: #1e293b;
        padding: 35px; border-radius: 28px; width: 90%; max-width: 400px;
        text-align: center; transform: scale(0.8); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .modal-overlay.active { display: flex; }
    .modal-overlay.active .modal-content { transform: scale(1); }

    .modal-icon { font-size: 50px; margin-bottom: 20px; display: inline-block; padding: 20px; border-radius: 50%; }
    .icon-error { color: var(--danger-red); background: #fee2e2; }
    .icon-success { color: #2ecc71; background: #e7f3ec; }
    .icon-loading { color: #3b82f6; background: #dbeafe; }

    .modal-btn { 
        margin-top: 25px; padding: 12px 30px; border-radius: 12px; 
        background: var(--primary-green); color: white; border: none; 
        font-weight: 700; cursor: pointer; font-family: 'Inter';
    }

    @keyframes fadeIn { from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);} }

    @media (max-width:992px) { 
        .header { flex-direction: column; gap: 20px; }
        .header-center { margin-left: 0; }
        .form-row { grid-template-columns:1fr; gap:15px; } 
        .signup-card { padding:40px 25px; } 
    }
  </style>
</head>

<body>
  <div id="statusModal" class="modal-overlay">
    <div class="modal-content">
        <div id="modalIcon" class="modal-icon"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
        <h3 id="modalTitle" style="margin: 0 0 10px 0; font-size: 22px; color: var(--primary-green);">Processing</h3>
        <p id="modalMsg" style="color: #64748b; margin: 0; line-height: 1.5;">Please wait while we set up your account...</p>
        <button id="modalCloseBtn" class="modal-btn" style="display:none;" onclick="closeModal()">Try Again</button>
    </div>
  </div>

  <div class="header">
    <div class="header-left">
        <img src="logo4.png" alt="Bagong Pilipinas">
        <img src="logo2.png" alt="Province of Misamis Oriental">
        <img src="logo3.png" alt="PPO">
    </div>

    <div class="header-center">
        <span class="republic-text">Republic of the Philippines</span>
        <span class="province-text">Province of Misamis Oriental</span>
        <h1 class="ppo-title">Provincial Population Office</h1>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="signup.html" class="nav-signup">Sign Up</a>
        <a href="signin.html">Sign In</a>
    </nav>
  </div>

  <div class="main-wrapper">
    <div class="signup-card">
      <h2>Create Account</h2>
      <p>Join the Provincial Population Office community today.</p>

      <form class="form" onsubmit="signup(event)">
        <div class="form-row">
          <div class="input-wrapper">
            <input id="lastName" type="text" placeholder="Last Name" required>
          </div>
          <div class="input-wrapper">
            <input id="firstName" type="text" placeholder="First Name" required>
          </div>
        </div>

        <div class="form-row">
          <div class="input-wrapper">
            <input id="department" type="text" placeholder="Department" required>
          </div>
          <div class="input-wrapper">
            <input id="email" type="email" placeholder="Username" required>
          </div>
        </div>

        <div class="form-row">
          <div class="input-wrapper password-wrapper">
            <input id="password" type="password" placeholder="Password" required>
            <i class="fa-solid fa-eye-slash toggle-password"></i>
          </div>
          <div class="input-wrapper password-wrapper">
            <input id="confirmPassword" type="password" placeholder="Confirm Password" required>
            <i class="fa-solid fa-eye-slash toggle-password"></i>
          </div>
        </div>

        <button type="submit" class="submit-btn">Register Account</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA6MAPqz4zt6Ed9vdLH6x01Imfqc6PjlI8",
      authDomain: "ppo-system.firebaseapp.com",
      projectId: "ppo-system",
      storageBucket: "ppo-system.appspot.com",
      messagingSenderId: "928903097456",
      appId: "1:928903097456:web:6862effa063911af7bd8b5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Modal UI Control
    const modal = document.getElementById('statusModal');
    const modalIcon = document.getElementById('modalIcon');
    const modalTitle = document.getElementById('modalTitle');
    const modalMsg = document.getElementById('modalMsg');
    const modalBtn = document.getElementById('modalCloseBtn');

    window.closeModal = () => modal.classList.remove('active');

    function showStatus(type, title, message) {
        modal.classList.add('active');
        modalTitle.innerText = title;
        modalMsg.innerText = message;
        modalBtn.style.display = type === 'error' ? 'inline-block' : 'none';

        if (type === 'loading') {
            modalIcon.className = "modal-icon icon-loading";
            modalIcon.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
        } else if (type === 'success') {
            modalIcon.className = "modal-icon icon-success";
            modalIcon.innerHTML = '<i class="fa-solid fa-check"></i>';
        } else {
            modalIcon.className = "modal-icon icon-error";
            modalIcon.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i>';
        }
    }

    // Toggle Passwords
    document.querySelectorAll(".toggle-password").forEach(icon => {
      icon.addEventListener("click", () => {
        const input = icon.previousElementSibling;
        const isPassword = input.type === "password";
        input.type = isPassword ? "text" : "password";
        icon.classList.toggle("fa-eye", isPassword);
        icon.classList.toggle("fa-eye-slash", !isPassword);
      });
    });

    const firstNameInput = document.getElementById("firstName");
    const lastNameInput = document.getElementById("lastName");
    const departmentInput = document.getElementById("department");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");

    window.signup = async function(e) {
      e.preventDefault();

      const firstName = firstNameInput.value.trim();
      const lastName = lastNameInput.value.trim();
      const department = departmentInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirm = confirmPasswordInput.value;

      if (password !== confirm) { 
        showStatus('error', 'Mismatch', 'Passwords do not match. Please verify.'); 
        return; 
      }

      showStatus('loading', 'Creating Account', 'Registering your profile to the PPO database...');

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const fullName = `${firstName} ${lastName}`;

        await setDoc(doc(db, "users", cred.user.uid), {
          firstName,
          lastName,
          fullname: fullName,
          department,
          email,
          role: "user",
          createdAt: new Date()
        });

        localStorage.setItem("ppoUserName", firstName + " " + lastName);
        
        showStatus('success', 'Welcome!', 'Your account was created successfully. Redirecting...');
        
        setTimeout(() => {
            window.location.href = "signin.html";
        }, 2000);

      } catch (err) { 
        showStatus('error', 'Registration Failed', err.message); 
      }
    };
  </script>
</body>
</html>
